<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile ★</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
body{
    background:#03BDF0;
    display:flex;
    font-family:'Quicksand';
    color:white;
    overflow-x:hidden;
    position:relative;
}
.kiki,.bouba{
    position:fixed;
    opacity:0.18;
}
.kiki{
    font-size:100px;
}
.bouba{
    border-radius:50%;
}
.s1{top:40px;right:80px;color:#FF7CA4;}
.s2{bottom:40px;left:260px;color:#6BDD6B;}
.c1{
    width:220px;
    height:220px;
    background:#D68CE5;
    top:-60px;
    left:170px;
}
.c2{
    width:180px;
    height:180px;
    background:#FF7CA4;
    bottom:-40px;
    right:-40px;
}
.bar{
    width:240px;
    min-height:100vh;
    background:white;
    padding:25px;
    position:fixed;
    border-radius:0 40px 40px 0;
}
.logo{
    width:150px;
    display:block;
    margin:0 auto 25px;
}
.nav{
    display:flex;
    flex-direction:column;
    gap:12px;
}
.nav a{
    height:52px;
    display:flex;
    justify-content:center;
    align-items:center;
    border-radius:18px;
    background:#03BDF0;
    color:white;
    text-decoration:none;
    transition:0.3s;
    font-weight:600;
}
.nav a:hover{
    background:#FF7CA4;
}
.mpart{
    margin-left:260px;
    padding:35px;
    width:100%;
}
.title{
    font-family:'Fredoka';
    font-size:58px;
    margin-bottom:25px;
}
.house{
    background:white;
    color:#03BDF0;
    padding:30px;
    border-radius:35px;
    max-width:550px;
    position:relative;
}
.house::after{
    content:"★";
    position:absolute;
    top:15px;
    right:18px;
    color:#FF7CA4;
    font-size:30px;
}
.house h2{
    font-family:'Fredoka';
    margin-bottom:15px;
}
.house p{
    margin-bottom:10px;
}
input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:18px;
    background:#eef9ff;
    margin-top:15px;
    font-family:'Quicksand';
}
button{
    margin-top:15px;
    padding:12px 18px;
    border:none;
    border-radius:18px;
    background:#D68CE5;
    color:white;
    cursor:pointer;
    transition:0.3s;
    font-family:'Quicksand';
}
button:hover{
    background:#c56bdd;
}
</style>
</head>
<body>

<div class="kiki s1">★</div>
<div class="kiki s2">★</div>
<div class="bouba c1"></div>
<div class="bouba c2"></div>

<div class="bar">
<img src="logo.png" class="logo">
<div class="nav">
<a href="dashboard.html">Dashboard</a>
<a href="notebooks.html">Notebooks</a>
<a href="tasks.html">Tasks</a>
<a href="profile.html">! Profile</a>
<a href="index.html">Logout</a>
</div></div>

<div class="mpart">
<h1 class="title">Profile</h1>
<div class="house">
<h2>YOUR Student Information</h2>
<p><b>Section:</b> 9-Ruby</p>
<p><b>School Year:</b> 2025-2026</p>
<p><b>Student Number:</b> SN14367</p>
<input type="password" id="newpass" placeholder="Enter New Password">
<button onclick="changepass()">Change Password</button>
</div></div>

<script>
const normpass = "123group4";
const passkey = "storepass";
function getPassword() {
    let p = localStorage.getItem(passkey);

    if (!p || p === "null" || p === "undefined") {
        localStorage.setItem(passkey, normpass);
        return normpass;
    }
    return p;
}
getPassword();
function changepass() {
    let newpass = document.getElementById("newpass").value.trim();

    if (newpass.length < 4) {
        alert("Atleast 4 characters pleaseee");
        return;
    }
    localStorage.setItem(passkey, newpass);
    alert("WE WERE SERIOUS! It really did change!");
    document.getElementById("newpass").value = "";
}
</script>
</body>
</html>
